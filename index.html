<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>benyiibarber — Reserva tu cita</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--black:#0a0a0a;--white:#f5f5f0;--gray:#888;--lightgray:#ddd}
  body{background:var(--black);min-height:100vh;color:var(--white);font-family:'DM Sans',sans-serif}
  .header{display:flex;align-items:center;justify-content:space-between;padding:28px 40px 24px;border-bottom:1px solid #222}
  .logo{display:flex;align-items:center;gap:16px}
  .logo-mark{width:52px;height:52px;background:var(--white);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--black);letter-spacing:1px;flex-shrink:0;cursor:pointer;user-select:none}
  .brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--white)}
  .brand span{color:var(--gray)}
  .tagline{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .main{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 89px)}
  .left-panel{padding:48px 40px;border-right:1px solid #222}
  .right-panel{padding:48px 40px}
  .section-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:24px}
  .calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .cal-nav{background:none;border:1px solid #333;color:var(--white);width:32px;height:32px;border-radius:3px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .cal-nav:hover{background:var(--white);color:var(--black)}
  .cal-month{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .day-label{text-align:center;font-size:10px;letter-spacing:2px;color:var(--gray);padding:4px 0;text-transform:uppercase}
  .day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:3px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;color:var(--white);background:none;position:relative}
  .day-cell:hover:not(.empty):not(.past):not(.blocked){background:#1a1a1a;border-color:#333}
  .day-cell.today{border-color:#555}
  .day-cell.selected{background:var(--white);color:var(--black);font-weight:500}
  .day-cell.has-booking::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--white);border-radius:50%}
  .day-cell.has-booking.selected::after{background:var(--black)}
  .day-cell.past{color:#2a2a2a;cursor:default}
  .day-cell.empty{cursor:default}
  .day-cell.blocked{color:#2a2a2a;cursor:not-allowed;text-decoration:line-through}
  .day-cell.blocked-admin{color:#cc4444;background:#1a0000;border-color:#3a1010;cursor:pointer}
  .day-cell.blocked-admin:hover{background:#2a0000;border-color:#552020}
  .divider{height:1px;background:#1e1e1e;margin:32px 0}
  .form-group{margin-bottom:20px}
  .form-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:8px;display:block}
  .form-input{width:100%;background:#111;border:1px solid #2a2a2a;color:var(--white);padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;border-radius:3px;outline:none;transition:border-color 0.2s}
  .form-input:focus{border-color:#555}
  .form-input::placeholder{color:#444}
  .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .time-slot{background:#111;border:1px solid #2a2a2a;color:var(--gray);padding:10px 6px;font-size:12px;border-radius:3px;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'DM Sans',sans-serif}
  .time-slot:hover:not(.booked):not(.blocked){background:#1a1a1a;border-color:#444;color:var(--white)}
  .time-slot.selected{background:var(--white);color:var(--black);border-color:var(--white);font-weight:500}
  .time-slot.booked{color:#2a2a2a;cursor:not-allowed;border-color:#1a1a1a}
  .time-slot.blocked{color:#2a2a2a;cursor:not-allowed;text-decoration:line-through;border-color:#1a1a1a}
  .time-slot.blocked-admin{background:#1a0000;border-color:#3a1010;color:#cc4444;cursor:pointer}
  .time-slot.blocked-admin:hover{background:#2a0000;border-color:#552020}
  .btn-book{width:100%;background:var(--white);color:var(--black);border:none;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;border-radius:3px;margin-top:24px;transition:all 0.2s}
  .btn-book:hover{background:#e0e0db}
  .btn-book:active{transform:scale(0.99)}
  .appointments-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
  .appt-card{background:#0f0f0f;border:1px solid #222;border-radius:3px;padding:16px;display:flex;justify-content:space-between;align-items:flex-start}
  .appt-date{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1}
  .appt-meta{font-size:11px;color:var(--gray);margin-top:4px;letter-spacing:0.5px}
  .appt-time{font-size:20px;font-family:'Bebas Neue',sans-serif;color:var(--gray);letter-spacing:1px}
  .appt-remove{background:none;border:none;color:#333;cursor:pointer;font-size:16px;margin-left:12px;transition:color 0.2s;padding:2px}
  .appt-remove:hover{color:#888}
  .empty-state{color:#333;font-size:13px;text-align:center;padding:32px 0;letter-spacing:1px}
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--white);color:var(--black);padding:12px 24px;border-radius:3px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;letter-spacing:1px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .required-dot{color:#555;margin-left:2px}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:4px;padding:40px;width:100%;max-width:400px;position:relative;margin:16px}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;margin-bottom:6px}
  .modal-sub{font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
  .modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--gray);font-size:22px;cursor:pointer;line-height:1}
  .modal-close:hover{color:var(--white)}
  .admin-panel{display:none;background:#060606;border-top:1px solid #1a1a1a;padding:40px}
  .admin-panel.open{display:block}
  .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
  .admin-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px}
  .admin-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;background:#1a1a00;border:1px solid #333300;color:#888800;padding:4px 10px;border-radius:3px;margin-left:14px}
  .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px}
  .btn-admin{background:none;border:1px solid #2a2a2a;color:var(--gray);padding:10px 18px;font-family:'DM Sans',sans-serif;font-size:12px;border-radius:3px;cursor:pointer;transition:all 0.2s;letter-spacing:1px}
  .btn-admin:hover{border-color:#555;color:var(--white)}
  .blocked-list{display:flex;flex-direction:column;gap:6px;margin-top:14px;max-height:200px;overflow-y:auto}
  .blocked-item{display:flex;justify-content:space-between;align-items:center;background:#111;border:1px solid #1e1e1e;border-radius:3px;padding:8px 12px;font-size:12px}
  .blocked-item-label{color:var(--gray)}
  .blocked-item-remove{background:none;border:none;color:#333;cursor:pointer;font-size:15px;transition:color 0.2s;padding:0 2px}
  .blocked-item-remove:hover{color:#cc4444}
  .admin-logout{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#333;cursor:pointer;background:none;border:none;transition:color 0.2s}
  .admin-logout:hover{color:var(--gray)}
  select.form-input option{background:#111;color:var(--white)}
  @media(max-width:700px){
    .main{grid-template-columns:1fr}
    .left-panel{border-right:none;border-bottom:1px solid #222;padding:32px 20px}
    .right-panel{padding:32px 20px}
    .header{padding:20px}
    .admin-grid{grid-template-columns:1fr}
    .admin-panel{padding:28px 20px}
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark" id="logo-btn">BGZ</div>
    <div>
      <div class="brand">benyii<span>barber</span></div>
      <div class="tagline">Reserva tu cita</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="section-label">Selecciona fecha</div>
    <div class="calendar-header">
      <button class="cal-nav" id="prev">&#8592;</button>
      <div class="cal-month" id="cal-month"></div>
      <button class="cal-nav" id="next">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="divider"></div>
    <div class="section-label">Selecciona hora</div>
    <div class="time-grid" id="time-grid"></div>
  </div>

  <div class="right-panel">
    <div class="section-label">Tus datos</div>
    <div class="form-group">
      <label class="form-label">Nombre<span class="required-dot">*</span></label>
      <input class="form-input" id="inp-name" type="text" placeholder="Tu nombre completo">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <input class="form-input" id="inp-notes" type="text" placeholder="Ej: corte a tijera, difuminado...">
    </div>
    <button class="btn-book" id="btn-book">CONFIRMAR CITA</button>
    <div class="divider"></div>
    <div class="section-label">Próximas citas</div>
    <div class="appointments-list" id="appt-list"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-header">
    <div style="display:flex;align-items:center">
      <div class="admin-title">Panel barbero</div>
      <div class="admin-badge">ADMIN</div>
    </div>
    <button class="admin-logout" id="admin-logout">Cerrar sesión</button>
  </div>
  <div class="admin-grid">
    <div>
      <div class="section-label">Bloquear día completo</div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" id="admin-block-date" type="date">
      </div>
      <button class="btn-admin" id="btn-block-day">+ Bloquear día</button>
      <div style="margin-top:28px">
        <div class="section-label">Bloquear rango de días</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Desde</label>
            <input class="form-input" id="admin-range-from" type="date">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Hasta</label>
            <input class="form-input" id="admin-range-to" type="date">
          </div>
        </div>
        <button class="btn-admin" id="btn-block-range">+ Bloquear rango</button>
      </div>
      <div style="margin-top:28px">
        <div class="section-label">Días bloqueados</div>
        <div class="blocked-list" id="blocked-days-list"></div>
      </div>
    </div>
    <div>
      <div class="section-label">Bloquear hora suelta</div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" id="admin-block-time-date" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Hora</label>
        <select class="form-input" id="admin-block-time-slot">
          <option value="">Selecciona hora</option>
        </select>
      </div>
      <button class="btn-admin" id="btn-block-time">+ Bloquear hora</button>
      <div style="margin-top:28px">
        <div class="section-label">Horas bloqueadas</div>
        <div class="blocked-list" id="blocked-times-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONTRASEÑA -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">&times;</button>
    <div class="modal-title">Acceso barbero</div>
    <div class="modal-sub">Panel de administración</div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="admin-pass" type="password" placeholder="••••••••">
    </div>
    <button class="btn-book" id="btn-login" style="margin-top:0">ENTRAR</button>
    <div id="login-error" style="font-size:12px;color:#884444;margin-top:14px;letter-spacing:1px;display:none">Contraseña incorrecta</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = 'bgz2024';
const TIMES = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30'];
const DAYS = ['LU','MA','MI','JU','VI','SA','DO'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function load(key, def) { try { return JSON.parse(localStorage.getItem(key) || 'null') || def; } catch(e) { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

let state = {
  currentDate: new Date(),
  selectedDate: null,
  selectedTime: null,
  appointments: load('bgz_appts', []),
  blockedDays: load('bgz_blocked_days', []),
  blockedTimes: load('bgz_blocked_times', []),
  adminOpen: false
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function isDayBlocked(dateStr) { return state.blockedDays.includes(dateStr); }
function isTimeBlocked(dateStr, time) { return state.blockedTimes.some(b => b.date === dateStr && b.time === time); }

function renderCalendar() {
  const d = state.currentDate;
  document.getElementById('cal-month').textContent = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const el = document.createElement('div');
    el.className = 'day-label';
    el.textContent = day;
    grid.appendChild(el);
  });
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty';
    grid.appendChild(el);
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(d.getFullYear(), d.getMonth(), day);
    const dateStr = cellDate.toDateString();
    const isPast = cellDate < today;
    const isBlocked = isDayBlocked(dateStr);
    const el = document.createElement('div');
    let cls = 'day-cell';
    if (isPast) { cls += ' past'; }
    else if (isBlocked) { cls += state.adminOpen ? ' blocked-admin' : ' blocked'; }
    else if (dateStr === today.toDateString()) { cls += ' today'; }
    if (state.selectedDate && dateStr === state.selectedDate.toDateString()) cls += ' selected';
    if (!isBlocked && state.appointments.filter(a => a.date === dateStr).length > 0) cls += ' has-booking';
    el.className = cls;
    el.textContent = day;
    el.addEventListener('click', () => {
      if (isPast) return;
      if (isBlocked && !state.adminOpen) { showToast('Este dia no esta disponible'); return; }
      if (isBlocked && state.adminOpen) {
        if (confirm('Desbloquear ' + formatDateDisplay(dateStr) + '?')) {
          state.blockedDays = state.blockedDays.filter(bd => bd !== dateStr);
          save('bgz_blocked_days', state.blockedDays);
          renderCalendar(); renderAdminBlockedDays();
          showToast('Dia desbloqueado');
        }
        return;
      }
      state.selectedDate = new Date(cellDate);
      state.selectedTime = null;
      renderCalendar(); renderTimes();
    });
    grid.appendChild(el);
  }
}

function renderTimes() {
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';
  const dateStr = state.selectedDate ? state.selectedDate.toDateString() : null;
  const bookedTimes = dateStr ? state.appointments.filter(a => a.date === dateStr).map(a => a.time) : [];
  const dayBlocked = dateStr ? isDayBlocked(dateStr) : false;

  TIMES.forEach(t => {
    const el = document.createElement('div');
    const timeBlocked = dateStr ? isTimeBlocked(dateStr, t) : false;
    let cls = 'time-slot';
    if (dayBlocked) {
      cls += state.adminOpen ? ' blocked-admin' : ' blocked';
    } else if (timeBlocked) {
      cls += state.adminOpen ? ' blocked-admin' : ' blocked';
    } else if (bookedTimes.includes(t)) {
      cls += ' booked';
    }
    if (state.selectedTime === t) cls += ' selected';
    el.className = cls;
    el.textContent = t;
    el.addEventListener('click', () => {
      if (!dateStr) { showToast('Selecciona primero una fecha'); return; }
      if (dayBlocked && state.adminOpen) {
        showToast('El dia entero esta bloqueado. Desbloquea el dia primero.'); return;
      }
      if (timeBlocked && state.adminOpen) {
        if (confirm('Desbloquear ' + t + '?')) {
          state.blockedTimes = state.blockedTimes.filter(b => !(b.date === dateStr && b.time === t));
          save('bgz_blocked_times', state.blockedTimes);
          renderTimes(); renderAdminBlockedTimes();
          showToast('Hora desbloqueada');
        }
        return;
      }
      if (dayBlocked || timeBlocked || bookedTimes.includes(t)) return;
      state.selectedTime = t;
      renderTimes();
    });
    grid.appendChild(el);
  });
}

function formatDateDisplay(dateStr) {
  const d = new Date(dateStr);
  return d.getDate() + ' ' + MONTHS[d.getMonth()].substring(0,3).toUpperCase();
}

function renderAppointments() {
  const list = document.getElementById('appt-list');
  const upcoming = state.appointments
    .filter(a => new Date(a.date) >= new Date(new Date().toDateString()))
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  if (upcoming.length === 0) { list.innerHTML = '<div class="empty-state">Sin citas proximas</div>'; return; }
  list.innerHTML = '';
  upcoming.forEach((appt, i) => {
    const el = document.createElement('div');
    el.className = 'appt-card';
    el.innerHTML =
      '<div><div class="appt-date">' + formatDateDisplay(appt.date) + '</div>' +
      '<div class="appt-meta">' + appt.name + '</div>' +
      (appt.notes ? '<div class="appt-meta" style="font-style:italic;margin-top:2px">' + appt.notes + '</div>' : '') + '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<div class="appt-time">' + appt.time + '</div>' +
      '<button class="appt-remove" data-idx="' + i + '">&times;</button></div>';
    list.appendChild(el);
  });
  list.querySelectorAll('.appt-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = upcoming[parseInt(btn.dataset.idx)];
      const gi = state.appointments.findIndex(a => a.date === target.date && a.time === target.time);
      if (gi !== -1) {
        state.appointments.splice(gi, 1);
        save('bgz_appts', state.appointments);
        renderCalendar(); renderTimes(); renderAppointments();
        showToast('Cita cancelada');
      }
    });
  });
}

document.getElementById('btn-book').addEventListener('click', () => {
  const name = document.getElementById('inp-name').value.trim();
  if (!state.selectedDate) { showToast('Selecciona una fecha'); return; }
  if (isDayBlocked(state.selectedDate.toDateString())) { showToast('Este dia no esta disponible'); return; }
  if (!state.selectedTime) { showToast('Selecciona una hora'); return; }
  if (isTimeBlocked(state.selectedDate.toDateString(), state.selectedTime)) { showToast('Esta hora no esta disponible'); return; }
  if (!name) { showToast('Introduce tu nombre'); return; }
  state.appointments.push({ date: state.selectedDate.toDateString(), time: state.selectedTime, name, notes: document.getElementById('inp-notes').value.trim() });
  save('bgz_appts', state.appointments);
  state.selectedDate = null; state.selectedTime = null;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-notes').value = '';
  renderCalendar(); renderTimes(); renderAppointments();
  showToast('Cita confirmada! Nos vemos pronto.');
});

document.getElementById('prev').addEventListener('click', () => {
  state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById('next').addEventListener('click', () => {
  state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 1);
  renderCalendar();
});

/* ADMIN - triple click en logo */
let logoClicks = 0, logoTimer = null;
document.getElementById('logo-btn').addEventListener('click', () => {
  logoClicks++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(() => { logoClicks = 0; }, 1500);
  if (logoClicks >= 3) {
    logoClicks = 0;
    if (!state.adminOpen) {
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('admin-pass').value = '';
      document.getElementById('login-error').style.display = 'none';
      setTimeout(() => document.getElementById('admin-pass').focus(), 100);
    }
  }
});

document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-overlay').classList.remove('open'));
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') document.getElementById('modal-overlay').classList.remove('open'); });
document.getElementById('admin-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-login').click(); });

document.getElementById('btn-login').addEventListener('click', () => {
  if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) {
    state.adminOpen = true;
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('admin-panel').classList.add('open');
    renderCalendar(); renderTimes(); renderAdminBlockedDays(); renderAdminBlockedTimes();
    showToast('Panel de barbero activado');
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('admin-pass').value = '';
    document.getElementById('admin-pass').focus();
  }
});

document.getElementById('admin-logout').addEventListener('click', () => {
  state.adminOpen = false;
  document.getElementById('admin-panel').classList.remove('open');
  renderCalendar(); renderTimes();
  showToast('Sesion cerrada');
});

/* BLOCK DAY */
document.getElementById('btn-block-day').addEventListener('click', () => {
  const val = document.getElementById('admin-block-date').value;
  if (!val) { showToast('Selecciona una fecha'); return; }
  const dateStr = new Date(val + 'T12:00:00').toDateString();
  if (state.blockedDays.includes(dateStr)) { showToast('Este dia ya esta bloqueado'); return; }
  state.blockedDays.push(dateStr);
  save('bgz_blocked_days', state.blockedDays);
  renderCalendar(); renderTimes(); renderAdminBlockedDays();
  showToast('Dia bloqueado');
  document.getElementById('admin-block-date').value = '';
});

/* BLOCK RANGE */
document.getElementById('btn-block-range').addEventListener('click', () => {
  const fromVal = document.getElementById('admin-range-from').value;
  const toVal   = document.getElementById('admin-range-to').value;
  if (!fromVal || !toVal) { showToast('Selecciona fecha de inicio y fin'); return; }
  const fromDate = new Date(fromVal + 'T12:00:00');
  const toDate   = new Date(toVal   + 'T12:00:00');
  if (toDate < fromDate) { showToast('La fecha fin debe ser igual o posterior al inicio'); return; }
  let count = 0;
  const cursor = new Date(fromDate);
  while (cursor <= toDate) {
    const dateStr = cursor.toDateString();
    if (!state.blockedDays.includes(dateStr)) {
      state.blockedDays.push(dateStr);
      count++;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  if (count === 0) { showToast('Todos esos dias ya estaban bloqueados'); return; }
  save('bgz_blocked_days', state.blockedDays);
  renderCalendar(); renderTimes(); renderAdminBlockedDays();
  showToast(count + ' día' + (count > 1 ? 's' : '') + ' bloqueado' + (count > 1 ? 's' : ''));
  document.getElementById('admin-range-from').value = '';
  document.getElementById('admin-range-to').value = '';
});

/* BLOCK TIME */
const tSel = document.getElementById('admin-block-time-slot');
TIMES.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tSel.appendChild(o); });

document.getElementById('btn-block-time').addEventListener('click', () => {
  const dv = document.getElementById('admin-block-time-date').value;
  const tv = document.getElementById('admin-block-time-slot').value;
  if (!dv || !tv) { showToast('Selecciona fecha y hora'); return; }
  const dateStr = new Date(dv + 'T12:00:00').toDateString();
  if (state.blockedTimes.some(b => b.date === dateStr && b.time === tv)) { showToast('Esta hora ya esta bloqueada'); return; }
  state.blockedTimes.push({ date: dateStr, time: tv });
  save('bgz_blocked_times', state.blockedTimes);
  renderTimes(); renderAdminBlockedTimes();
  showToast('Hora bloqueada');
  document.getElementById('admin-block-time-date').value = '';
  document.getElementById('admin-block-time-slot').value = '';
});

function renderAdminBlockedDays() {
  const list = document.getElementById('blocked-days-list');
  const sorted = [...state.blockedDays].sort((a,b) => new Date(a)-new Date(b));
  if (!sorted.length) { list.innerHTML = '<div style="font-size:12px;color:#333;padding:8px 0">Sin dias bloqueados</div>'; return; }
  list.innerHTML = '';
  sorted.forEach(d => {
    const el = document.createElement('div'); el.className = 'blocked-item';
    el.innerHTML = '<span class="blocked-item-label">' + formatDateDisplay(d) + ' ' + new Date(d).getFullYear() + '</span><button class="blocked-item-remove" data-date="' + d + '">&times;</button>';
    list.appendChild(el);
  });
  list.querySelectorAll('.blocked-item-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      state.blockedDays = state.blockedDays.filter(d => d !== btn.dataset.date);
      save('bgz_blocked_days', state.blockedDays);
      renderCalendar(); renderAdminBlockedDays();
      showToast('Dia desbloqueado');
    });
  });
}

function renderAdminBlockedTimes() {
  const list = document.getElementById('blocked-times-list');
  const sorted = [...state.blockedTimes].sort((a,b) => new Date(a.date)-new Date(b.date) || a.time.localeCompare(b.time));
  if (!sorted.length) { list.innerHTML = '<div style="font-size:12px;color:#333;padding:8px 0">Sin horas bloqueadas</div>'; return; }
  list.innerHTML = '';
  sorted.forEach((b, i) => {
    const el = document.createElement('div'); el.className = 'blocked-item';
    el.innerHTML = '<span class="blocked-item-label">' + formatDateDisplay(b.date) + ' — ' + b.time + '</span><button class="blocked-item-remove" data-idx="' + i + '">&times;</button>';
    list.appendChild(el);
  });
  list.querySelectorAll('.blocked-item-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = sorted[parseInt(btn.dataset.idx)];
      state.blockedTimes = state.blockedTimes.filter(b => !(b.date === target.date && b.time === target.time));
      save('bgz_blocked_times', state.blockedTimes);
      renderTimes(); renderAdminBlockedTimes();
      showToast('Hora desbloqueada');
    });
  });
}

renderCalendar();
renderTimes();
renderAppointments();
</script>
</body>
</html>
